<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;">
<title>Monitor</title>
<style>
/* ============================================================
   Monitor wallpaper dashboard — Ambient Instrument
   Warm-graphite OKLCH · disciplined signal colour · living waveform
   Push-fed (window.__monitorPush) · no network · no external assets
   Two layouts: SYSTEM HERO (no agents) · FLEET (agents present)
   ============================================================ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* warm-graphite neutrals (not blue-black, not pure black) — ported 1:1 */
  --bg-0: oklch(0.15 0.011 74);
  --bg-1: oklch(0.185 0.012 74);
  --bg-2: oklch(0.225 0.014 74);
  --bg-3: oklch(0.265 0.015 74);
  --line: oklch(0.34 0.016 74);
  --line-hi: oklch(0.46 0.02 74);
  --ink: oklch(0.93 0.012 84);
  --ink-dim: oklch(0.68 0.015 78);
  --ink-faint: oklch(0.505 0.014 76);
  --track: oklch(0.30 0.01 74);       /* gauge/bar troughs */
  --track-2: oklch(0.285 0.01 74);

  /* signal colours — the only saturated hues, reserved for state */
  --run:  oklch(0.80 0.128 78);   /* amber   = running        */
  --need: oklch(0.705 0.165 34);  /* coral   = needs you      */
  --done: oklch(0.76 0.10 158);   /* sage    = completed      */
  --err:  oklch(0.62 0.19 26);    /* deep red= error          */
  --idle: oklch(0.56 0.010 76);   /* neutral = idle           */
  --cool: oklch(0.68 0.05 235);   /* muted steel = secondary metric (net/gpu/temp) */

  --font: -apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",system-ui,sans-serif;
  --mono: ui-monospace,"SF Mono",Menlo,"Cascadia Mono",monospace;

  /* fluid scale — resolution independent (1512×982 → 5120×2880) */
  --u: clamp(13px, 1.28vmin, 30px);   /* base type unit */
  --pad: clamp(20px, 3.2vmin, 76px);  /* screen edge gutter */

  /* ---- one spacing scale (4·8·12·20·32·48), fluid ---- */
  --s1: clamp(3px,.42vmin,7px);
  --s2: clamp(6px,.84vmin,13px);
  --s3: clamp(9px,1.24vmin,20px);
  --s4: clamp(14px,2vmin,32px);
  --s5: clamp(22px,3vmin,50px);
  --s6: clamp(32px,4.4vmin,74px);
  --r:  clamp(9px,1.05vmin,16px);      /* panel corner radius */

  /* ---- shared instrument-surface material ---- */
  --panel-bg: linear-gradient(178deg, oklch(0.212 0.013 74/.72), oklch(0.176 0.012 74/.60));
  --panel-line: oklch(0.40 0.018 74/.55);
  --panel-hi: oklch(1 0 0/.055);            /* faint top-edge highlight */
  --panel-shadow: 0 clamp(10px,1.6vmin,30px) clamp(28px,4vmin,70px) -.9em oklch(0 0 0/.55);
  /* film-grain (SVG turbulence, ~370B, tiled) — whisper level */
  --grain: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='140'%20height='140'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.9'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20type='saturate'%20values='0'/%3E%3C/filter%3E%3Crect%20width='140'%20height='140'%20filter='url(%23n)'%20opacity='0.5'/%3E%3C/svg%3E");
}

html,body{height:100%;width:100%}
body{
  font-family:var(--font);
  color:var(--ink);
  background:#0c0b0a;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1,"cv01" 1;
  font-size:var(--u);
  cursor:default;
  user-select:none;
  -webkit-user-select:none;
}

/* ---------- screen + ambient background wash ---------- */
.screen{position:fixed;inset:0;overflow:hidden}
.bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(118% 86% at 84% 4%, oklch(0.238 0.024 62) 0%, transparent 52%),
    radial-gradient(150% 130% at 6% 106%, oklch(0.212 0.02 56) 0%, transparent 60%),
    radial-gradient(120% 78% at 50% 118%, oklch(0.205 0.017 70) 0%, transparent 55%),
    var(--bg-0);
}
/* very faint instrument baseline grid, top-masked — never a busy poster */
.bg::before{
  content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(oklch(0.99 0 0/.019) 1px,transparent 1px),
    linear-gradient(90deg,oklch(0.99 0 0/.011) 1px,transparent 1px);
  background-size:100% clamp(40px,4.6vmin,88px), clamp(40px,4.6vmin,88px) 100%;
  background-position:0 -1px, -1px 0;
  mask-image:radial-gradient(140% 120% at 50% 34%,#000 12%,oklch(0 0 0/.18) 68%);
  -webkit-mask-image:radial-gradient(140% 120% at 50% 34%,#000 12%,oklch(0 0 0/.18) 68%);
  opacity:.7;
}
/* whole-canvas vignette to keep the calm centre reading as a crafted surface */
.bg::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(112% 96% at 50% 42%, transparent 38%, oklch(0 0 0/.36) 100%);
}
/* barely-there canvas grain — separate layer, kept whisper-level so the open
   centre reads as a deep surface, never as noise */
.bg .grain-layer,.grain-layer{content:"";position:absolute;inset:0;pointer-events:none;
  background:var(--grain);background-size:200px 200px;opacity:.03;mix-blend-mode:overlay}
/* faint ambient horizon glyph — gives the open centre intent, not emptiness */
.centre-mark{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
  width:min(52vh,46vw);aspect-ratio:1;pointer-events:none;z-index:0;opacity:.5;
  background:
    radial-gradient(closest-side, transparent 60%, oklch(0.30 0.014 74/.10) 61%, transparent 63%),
    radial-gradient(closest-side, transparent 76%, oklch(0.30 0.014 74/.07) 77%, transparent 79%);
  -webkit-mask:radial-gradient(closest-side,#000,transparent);mask:radial-gradient(closest-side,#000,transparent)}
body[data-state="waiting"] .centre-mark{opacity:0}

/* ---------- generic instrument primitives ---------- */
.gauge{min-width:0}
.g-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5em;gap:.6em}
.g-name,.lbl{font-size:.74em;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;font-weight:500}
.g-val{font-size:1.16em;color:var(--ink);font-weight:600;white-space:nowrap;letter-spacing:-.01em;line-height:1}
.g-val small,.unit{font-size:.6em;color:var(--ink-faint);font-weight:500;margin-left:.28em;letter-spacing:.02em}
.bar{position:relative;height:clamp(4px,.56vmin,9px);border-radius:99px;background:var(--track);overflow:hidden;
  box-shadow:inset 0 1px 1.5px oklch(0 0 0/.4)}
.bar i{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:var(--ink-dim);
  width:0;transition:width .5s cubic-bezier(.3,.7,.2,1),background .6s ease}
.bar i::after{content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(oklch(1 0 0/.14),transparent 60%)}
.bar i.warm{background:linear-gradient(90deg,oklch(0.62 0.055 78),var(--run))}
.bar i.cool{background:linear-gradient(90deg,oklch(0.5 0.03 235),var(--cool))}
.bar i.warn{background:linear-gradient(90deg,var(--run),var(--need))}

/* conic ring (limit / dial) — faint recessed track sits behind the conic sweep;
   rounded cap illusion from the soft mask edge. Keep circle closest-side mask. */
.ring{position:relative;border-radius:50%;flex:0 0 auto;
  background:conic-gradient(var(--ring-c,var(--run)) calc(var(--p,0)*1%), oklch(0.315 0.012 74) 0);
  -webkit-mask:radial-gradient(circle closest-side at 50% 50%,transparent calc(var(--hole,64%) - 1.5%),#000 var(--hole,64%));
  mask:radial-gradient(circle closest-side at 50% 50%,transparent calc(var(--hole,64%) - 1.5%),#000 var(--hole,64%));
  transition:background .5s ease}
.ring::after{content:"";position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 0 0 1px oklch(0 0 0/.28);
  -webkit-mask:radial-gradient(circle closest-side at 50% 50%,transparent calc(var(--hole,64%) - 1.5%),#000 var(--hole,64%));
  mask:radial-gradient(circle closest-side at 50% 50%,transparent calc(var(--hole,64%) - 1.5%),#000 var(--hole,64%))}

/* sparkline canvas host */
.spark{position:relative;width:100%;height:100%;overflow:hidden}
.spark svg{position:absolute;inset:0;width:100%;height:100%;display:block}
.spark .base{stroke:var(--line);stroke-width:1;opacity:.45}
/* "now" head marker — round regardless of SVG stretch (CSS-positioned) */
.spark .nowdot{position:absolute;right:2px;width:clamp(4px,.6vmin,7px);height:clamp(4px,.6vmin,7px);
  border-radius:50%;background:var(--nc,var(--run));transform:translate(50%,-50%);
  box-shadow:0 0 0 2px oklch(0 0 0/.35), 0 0 8px -1px var(--nc,var(--run))}

/* ==========================================================
   LAYOUT A — SYSTEM HERO
   Instruments live in a lower band + corners; centre stays calm.
   ========================================================== */
.hero{position:absolute;inset:0;display:none;padding:var(--pad)}
body[data-layout="hero"] .hero{display:block}

.hero-mark{position:absolute;left:var(--pad);top:var(--pad);z-index:2}
.hero-mark b{font-size:.9em;font-weight:600;letter-spacing:.36em;color:var(--ink-dim);text-transform:uppercase}
.hero-mark b::before{content:"";display:inline-block;width:.5em;height:.5em;border-radius:50%;
  margin-right:.7em;vertical-align:.08em;background:var(--run);
  box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 9px -1px var(--run)}
.hero-mark span{display:block;margin-top:.42em;margin-left:1.2em;font-size:.72em;letter-spacing:.06em;color:var(--ink-faint)}

/* top-right: CPU dial (the ambient centrepiece, offset to a corner) */
.hero-dial{position:absolute;right:var(--pad);top:var(--pad);z-index:2;
  display:flex;align-items:center;gap:clamp(16px,1.9vmin,36px)}
.dial{--p:0;--ring-c:var(--run);--hole:71%;
  width:clamp(104px,14vmin,236px);aspect-ratio:1;position:relative;
  filter:drop-shadow(0 clamp(6px,1vmin,18px) clamp(14px,2vmin,34px) oklch(0 0 0/.5))}
.dial .ring{position:absolute;inset:0}
.dial::before{content:"";position:absolute;inset:calc((100% - 71%)/2 - 1px);border-radius:50%;
  background:radial-gradient(closest-side,oklch(0.2 0.012 74/.6),oklch(0.16 0.011 74/.35));
  box-shadow:inset 0 1px 0 oklch(1 0 0/.05),inset 0 0 clamp(14px,2vmin,30px) oklch(0 0 0/.4)}
.dial .dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:1}
.dial .dc .v{display:flex;align-items:baseline;justify-content:center;gap:.08em;
  font-size:2.15em;font-weight:600;line-height:1;letter-spacing:-.025em;
  transition:color .6s ease}
.dial .dc .v small{font-size:.42em;line-height:1;color:var(--ink-faint);font-weight:500}
.dial .dc .l{margin-top:.55em;font-size:.62em;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint)}
.dial-side{display:flex;flex-direction:column;gap:.62em;min-width:clamp(96px,10.5vmin,158px)}
.dial-side .kv{display:flex;justify-content:space-between;align-items:baseline;gap:1em;font-size:.78em;
  padding-bottom:.5em;border-bottom:1px solid oklch(0.34 0.016 74/.4)}
.dial-side .kv:last-child{border-bottom:0;padding-bottom:0}
.dial-side .kv .k{color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;font-size:.9em}
.dial-side .kv .n{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}

/* lower instrument band — three panels as material surfaces, sits low */
.hero-band{position:absolute;left:var(--pad);right:var(--pad);bottom:var(--pad);z-index:1;
  display:grid;grid-template-columns:1.2fr 1fr 1.05fr;gap:var(--s4);align-items:stretch}
.panel{min-width:0;position:relative;padding:var(--s3) var(--s4) var(--s4);border-radius:var(--r);
  background:var(--panel-bg);border:1px solid var(--panel-line);
  box-shadow:var(--panel-shadow),inset 0 1px 0 var(--panel-hi);
  display:flex;flex-direction:column}
.panel::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:var(--grain);background-size:180px 180px;opacity:.5;mix-blend-mode:overlay}
.panel > *{position:relative;z-index:1}
.panel > .p-head{display:flex;justify-content:space-between;align-items:baseline;
  font-size:.72em;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);
  margin-bottom:var(--s3);padding-bottom:.7em;border-bottom:1px solid oklch(0.34 0.016 74/.5)}
.panel > .p-head b{color:var(--ink-dim);font-weight:600;letter-spacing:.1em;text-transform:none}

/* per-core row */
.cores{display:grid;grid-template-columns:repeat(2,1fr);gap:.62em clamp(14px,1.7vmin,30px);flex:1;align-content:center}
.cores.wide{grid-template-columns:repeat(4,1fr)}
.core{display:flex;align-items:center;gap:.6em;font-size:.7em;color:var(--ink-faint)}
.core b{width:2.2em;color:var(--ink-faint);font-weight:500;flex:0 0 auto;letter-spacing:.04em;font-size:.94em}
.core .cb{flex:1;height:clamp(5px,.6vmin,9px);border-radius:99px;background:var(--track-2);overflow:hidden;position:relative;min-width:0;
  box-shadow:inset 0 1px 1px oklch(0 0 0/.35)}
.core .cb i{position:absolute;inset:0 auto 0 0;border-radius:99px;background:linear-gradient(90deg,oklch(0.6 0.05 78),var(--run));opacity:.9;width:0;transition:width .45s ease}
.core span{width:2.7em;text-align:right;flex:0 0 auto;color:var(--ink-dim);font-variant-numeric:tabular-nums}

/* gauge stack (mem/gpu) */
.gstack{display:flex;flex-direction:column;gap:clamp(14px,1.9vmin,30px);flex:1;justify-content:center}

/* sparkline pair (net / disk) */
.spark-pair{display:flex;flex-direction:column;gap:clamp(12px,1.6vmin,26px);flex:1;justify-content:center}
.spark-row{display:flex;flex-direction:column;gap:.5em}
.spark-row .sr-top{display:flex;justify-content:space-between;align-items:baseline;font-size:.74em}
.spark-row .sr-top .k{color:var(--ink-faint);letter-spacing:.15em;text-transform:uppercase;font-weight:500}
.spark-row .sr-top .k em{font-style:normal;color:var(--ink-dim);margin-right:.45em;font-weight:600}
.spark-row .sr-top .n{color:var(--ink);font-weight:500;font-family:var(--mono);font-size:.94em;letter-spacing:-.01em}
.spark-row .sbox{height:clamp(30px,4vmin,66px);border-radius:calc(var(--r) * .55);
  background:linear-gradient(oklch(0.155 0.011 74/.7),oklch(0.185 0.011 74/.4));
  border:1px solid oklch(0.34 0.016 74/.55);overflow:hidden;
  box-shadow:inset 0 1px 3px oklch(0 0 0/.35)}

/* bottom vitals strip (thermal/load/uptime/battery/pressure) */
.hero-strip{position:absolute;left:var(--pad);right:var(--pad);bottom:calc(var(--pad) * .28);
  display:none} /* strip folds into band foot instead; kept for wide screens via JS off by default */
.vstrip{display:flex;flex-wrap:wrap;align-items:center;gap:.6em clamp(10px,1.2vmin,18px);margin-top:var(--s3);
  padding-top:var(--s3);border-top:1px solid oklch(0.34 0.016 74/.5)}
.pill{display:inline-flex;align-items:center;gap:.5em;font-size:.72em;
  border:1px solid oklch(0.4 0.016 74/.6);border-radius:99px;padding:.36em .85em;color:var(--ink-dim);white-space:nowrap;
  background:oklch(0.24 0.012 74/.5);box-shadow:inset 0 1px 0 oklch(1 0 0/.04);transition:border-color .5s ease,background .5s ease}
.pill .k{color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;font-size:.86em;font-weight:500}
.pill .n{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.pill .dot{width:.5em;height:.5em;border-radius:50%;background:var(--done);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 6px -1px var(--done)}
.pill.warn{border-color:oklch(0.5 0.11 40/.75);color:oklch(0.9 0.03 44);background:oklch(0.3 0.05 44/.28)}
.pill.warn .dot{background:var(--run);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 6px -1px var(--run)}
.pill.crit{border-color:oklch(0.52 0.14 30/.8);color:oklch(0.92 0.04 34);background:oklch(0.30 0.05 32/.4)}
.pill.crit .dot{background:var(--need);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 7px -1px var(--need)}
.pill.batt .track{width:clamp(22px,2.6vmin,42px);height:.72em;border:1px solid var(--line-hi);border-radius:3px;position:relative;overflow:hidden;
  box-shadow:inset 0 1px 1px oklch(0 0 0/.3)}
.pill.batt .track::after{content:"";position:absolute;right:-2.5px;top:50%;transform:translateY(-50%);width:2px;height:.36em;border-radius:0 1px 1px 0;background:var(--line-hi)}
.pill.batt .track i{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,oklch(0.66 0.08 158),var(--done));width:0;transition:width .5s ease}
.pill.batt.low .track i{background:linear-gradient(90deg,var(--run),var(--need))}
.pill.chg .k::after{content:" ⚡";color:var(--run)}

/* ==========================================================
   LAYOUT B — FLEET
   Bottom Edge-Gutter agent rail + corner vitals cluster + usage + health.
   ========================================================== */
.fleet-wrap{position:absolute;inset:0;display:none}
body[data-layout="fleet"] .fleet-wrap{display:block}

.fleet-mark{position:absolute;left:var(--pad);top:var(--pad);z-index:2}
.fleet-mark b{font-size:.9em;font-weight:600;letter-spacing:.36em;color:var(--ink-dim);text-transform:uppercase}
.fleet-mark b::before{content:"";display:inline-block;width:.5em;height:.5em;border-radius:50%;
  margin-right:.7em;vertical-align:.08em;background:var(--run);
  box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 9px -1px var(--run)}
.fleet-mark span{display:block;margin-top:.42em;margin-left:1.2em;font-size:.72em;letter-spacing:.06em;color:var(--ink-faint)}

/* corner system-vitals cluster — a material card, not loose stacked text */
.vitals{position:absolute;right:var(--pad);top:var(--pad);width:clamp(168px,18.5vmin,320px);z-index:2;
  padding:var(--s3) var(--s4) var(--s4);border-radius:var(--r);
  background:var(--panel-bg);border:1px solid var(--panel-line);
  box-shadow:var(--panel-shadow),inset 0 1px 0 var(--panel-hi);
  display:flex;flex-direction:column;gap:var(--s3)}
.vitals::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:var(--grain);background-size:180px 180px;opacity:.5;mix-blend-mode:overlay}
.vitals > *{position:relative;z-index:1}
.vitals .vhead{display:flex;justify-content:space-between;align-items:baseline;
  font-size:.7em;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);
  padding-bottom:.7em;border-bottom:1px solid oklch(0.34 0.016 74/.5)}
.vitals .vhead b{color:var(--ink);font-weight:600;letter-spacing:0;text-transform:none;font-size:1.14em}
.vitals .vhead span{font-size:.9em}
.mini-arcs{display:flex;justify-content:space-between;gap:clamp(8px,1vmin,16px)}
/* number alone inside the ring hole; label sits below the ring (no in-hole stacking) */
.marc{--p:0;--ring-c:var(--run);--hole:72%;width:clamp(42px,4.9vmin,80px);
  display:flex;flex-direction:column;align-items:center;gap:.42em;flex:1 1 0;min-width:0}
.marc .rwrap{position:relative;width:100%;aspect-ratio:1;
  filter:drop-shadow(0 clamp(3px,.5vmin,8px) clamp(6px,1vmin,16px) oklch(0 0 0/.42))}
.marc .rwrap::before{content:"";position:absolute;inset:calc((100% - 72%)/2 - 1px);border-radius:50%;
  background:radial-gradient(closest-side,oklch(0.2 0.012 74/.55),oklch(0.16 0.011 74/.3));
  box-shadow:inset 0 1px 0 oklch(1 0 0/.05)}
.marc .rwrap .ring{position:absolute;inset:0}
.marc .rwrap .v{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.72em;font-weight:600;line-height:1;letter-spacing:-.03em;z-index:1}
.marc .l{font-size:.56em;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.net-tick{display:flex;justify-content:space-between;align-items:baseline;gap:.5em;font-size:.7em;font-family:var(--mono);
  color:var(--ink-dim);padding-top:.75em;border-top:1px solid oklch(0.34 0.016 74/.5);white-space:nowrap}
.net-tick .nk{color:var(--ink-faint);letter-spacing:.1em;flex:0 0 auto;font-family:var(--font);font-weight:500;text-transform:uppercase;font-size:.9em}
.net-tick .nv{min-width:0;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}

/* usage block */
.usage{margin-top:.1em;padding-top:var(--s3);border-top:1px solid oklch(0.34 0.016 74/.5);
  display:flex;flex-direction:column;gap:var(--s3)}
.usage .u-row{display:flex;align-items:center;gap:.9em}
.usage .u-ring{--p:0;--ring-c:var(--run);--hole:62%;width:clamp(38px,4.4vmin,64px);aspect-ratio:1;position:relative;flex:0 0 auto;
  filter:drop-shadow(0 clamp(2px,.4vmin,6px) clamp(5px,.8vmin,12px) oklch(0 0 0/.4))}
.usage .u-ring::before{content:"";position:absolute;inset:calc((100% - 62%)/2 - 1px);border-radius:50%;
  background:radial-gradient(closest-side,oklch(0.2 0.012 74/.55),oklch(0.16 0.011 74/.3))}
.usage .u-ring .ring{position:absolute;inset:0}
.usage .u-ring .uc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.66em;font-weight:600;color:var(--ink);z-index:1;letter-spacing:-.03em}
.usage .u-lt{min-width:0}
.usage .u-lt b{font-size:.92em;color:var(--ink);display:block;font-weight:600;letter-spacing:-.01em}
.usage .u-lt span{font-size:.62em;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.usage .u-week{display:flex;flex-direction:column;gap:.5em}
.usage .u-week .wk-top{display:flex;justify-content:space-between;align-items:baseline;font-size:.72em}
.usage .u-week .wk-top .k{color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.usage .u-week .wk-top .n{color:var(--ink-dim);font-variant-numeric:tabular-nums}
.usage .u-today{display:flex;justify-content:space-between;align-items:baseline;font-size:.74em;
  padding-top:.7em;border-top:1px solid oklch(0.34 0.016 74/.4)}
.usage .u-today .k{color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.usage .u-today .n{color:var(--ink);font-weight:600;font-size:1.28em;letter-spacing:-.01em}

/* the agent rail (Edge-Gutter, bottom) */
.rail{position:absolute;left:var(--pad);right:var(--pad);bottom:var(--pad);z-index:5;
  display:flex;align-items:stretch;gap:clamp(10px,1.2vmin,22px)}
.rail-lead{flex:0 0 auto;align-self:stretch;display:flex;flex-direction:column;justify-content:flex-end;
  padding-bottom:.55em;padding-right:.35em}
.rail-lead b{font-size:.78em;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint);
  writing-mode:vertical-rl;transform:rotate(180deg)}
.rail-empty{color:var(--ink-faint);font-size:.86em;padding:1.1em 1.2em;letter-spacing:.03em;
  border:1px dashed oklch(0.34 0.016 74/.6);border-radius:var(--r);
  display:flex;align-items:center;gap:.6em}
.rail-empty::before{content:"";width:.5em;height:.5em;border-radius:50%;background:var(--idle);opacity:.6}

/* agent strip — width driven by status (needsInput widest) */
.strip{position:relative;flex:1 1 0;min-width:0;
  background:linear-gradient(178deg,oklch(0.258 0.014 74/.92),oklch(0.208 0.013 74/.86));
  border:1px solid var(--panel-line);border-radius:var(--r);padding:.9em 1.05em .78em;
  border-top-color:var(--line-hi);overflow:hidden;
  box-shadow:var(--panel-shadow),inset 0 1px 0 oklch(1 0 0/.05);
  transition:flex-grow .55s cubic-bezier(.2,.7,.2,1),opacity .45s ease,border-color .5s ease,box-shadow .5s ease}
.strip::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:var(--grain);background-size:170px 170px;opacity:.45;mix-blend-mode:overlay}
.strip > *{position:relative;z-index:1}
.strip .lead-tick{position:absolute;left:0;top:.9em;bottom:.78em;width:3px;border-radius:0 3px 3px 0;background:var(--idle);z-index:2;
  transition:background .45s ease,box-shadow .45s ease}
.strip .row1{display:flex;align-items:center;gap:.55em;margin-bottom:.7em}
.strip .prov{flex:0 0 auto;font-size:.62em;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--bg-1);
  background:var(--ink-dim);border-radius:4px;padding:.22em .5em;line-height:1;
  box-shadow:inset 0 1px 0 oklch(1 0 0/.18),0 1px 1px oklch(0 0 0/.25)}
.strip .name{font-size:1.0em;font-weight:600;letter-spacing:-.01em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.strip .status{flex:0 0 auto;margin-left:auto;padding-left:.5em;font-size:.64em;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;
  display:inline-flex;align-items:center;gap:.5em}
.strip .status::before{content:"";width:.42em;height:.42em;border-radius:50%;background:currentColor;flex:0 0 auto;opacity:.9}
.strip .ask{font-size:.92em;color:oklch(0.95 0.028 40);margin-bottom:.65em;font-weight:500;line-height:1.35;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.strip .ask b{color:var(--need)}
.strip .meta{display:flex;flex-wrap:wrap;gap:.4em .55em;align-items:center;margin-bottom:.75em;min-height:1.5em}
.chip{font-family:var(--mono);font-size:.72em;color:var(--ink-dim);
  border:1px solid oklch(0.4 0.016 74/.6);border-radius:5px;padding:.14em .5em;line-height:1.25;
  background:oklch(0.22 0.012 74/.5);
  max-width:15em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip.b{color:var(--ink);border-color:var(--line-hi);background:oklch(0.26 0.014 74/.6)}
.chip.b::before{content:"⑂ ";color:var(--ink-faint);font-family:var(--font)}
.dim{font-size:.74em;color:var(--ink-faint);letter-spacing:.02em;white-space:nowrap}
.strip .meta .dim{margin-left:auto}
.strip .meta .dim ~ .dim{margin-left:0}

/* living waveform — the signature; a touch more presence + baseline */
.wave{position:relative;height:clamp(22px,2.5vmin,46px);overflow:hidden;border-radius:5px;
  background:linear-gradient(oklch(0.16 0.011 74/.4),transparent);
  -webkit-mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
  mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
.wave svg{position:absolute;left:0;top:0;height:100%;width:200%;display:none}
.wave .flat{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line-hi);opacity:0}
.wave-foot{display:flex;justify-content:space-between;align-items:baseline;margin-top:.55em;gap:.6em}
.wave-foot .t{font-size:.74em;color:var(--ink-faint);letter-spacing:.02em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wave-foot .t-right{color:var(--ink-dim);font-variant-numeric:tabular-nums;flex:0 0 auto;font-weight:500}

/* provider tints (claude=amber-leaning ink, codex=neutral) kept quiet */
.strip .prov[data-p="claude"]{background:linear-gradient(oklch(0.72 0.02 78),oklch(0.66 0.02 78))}
.strip .prov[data-p="codex"]{background:linear-gradient(oklch(0.64 0.014 76),oklch(0.58 0.014 76))}

/* status styles */
.strip.is-running .lead-tick{background:var(--run);box-shadow:0 0 12px -1px var(--run)}
.strip.is-running .status{color:var(--run)}
.strip.is-running .wave svg{display:block;color:var(--run)}
.strip.is-running .wave svg polyline{stroke:var(--run)}

.strip.is-ended{opacity:.5}
.strip.is-ended .lead-tick{background:var(--done)}
.strip.is-ended .status{color:var(--done)}
.strip.is-ended .name{color:var(--ink-dim)}
.strip.is-ended .wave .flat{opacity:.5;background:var(--done)}

.strip.is-idle{flex-grow:.34;opacity:.56;padding:.9em .85em .78em}
.strip.is-idle .meta,.strip.is-idle .wave-foot,.strip.is-idle .ask{display:none}
.strip.is-idle .wave{height:clamp(14px,1.6vmin,26px)}
.strip.is-idle .wave .flat{opacity:.45}
.strip.is-idle .status{color:var(--ink-faint)}

.strip.is-unknown{opacity:.66}
.strip.is-unknown .lead-tick{background:var(--idle)}
.strip.is-unknown .wave .flat{opacity:.38}

/* needs-you: widest, brightest, coral flatline + breathing (60s glow-decay) */
.strip.is-needsInput{flex-grow:1.9;
  border-color:oklch(0.55 0.13 34/.85);
  background:linear-gradient(178deg,oklch(0.315 0.055 34/.94),oklch(0.235 0.032 34/.9))}
.strip.is-needsInput .lead-tick{background:var(--need);box-shadow:0 0 16px 0 var(--need)}
.strip.is-needsInput .status{color:var(--need)}
.strip.is-needsInput .name{color:oklch(0.97 0.02 40)}
.strip.is-needsInput .prov{background:linear-gradient(var(--need),oklch(0.64 0.16 34));color:oklch(0.16 0.02 34)}
.strip.is-needsInput .chip{border-color:oklch(0.5 0.09 34/.6);background:oklch(0.3 0.05 34/.4)}
.strip.is-needsInput .wave .flat{opacity:.7;background:var(--need)}
.strip.is-needsInput::after{content:"";position:absolute;inset:-1px;border-radius:var(--r);pointer-events:none;z-index:2;
  box-shadow:0 0 0 1px oklch(0.6 0.15 34/.5), 0 0 34px -4px var(--need);
  animation:breathe 4s ease-in-out infinite;
  opacity:var(--glow,1)}   /* --glow decays 1→~.25 over 60s via JS */

/* health footer */
.health{position:absolute;left:var(--pad);bottom:calc(var(--pad) + clamp(150px,17vmin,300px));
  display:none} /* positioned by JS relative to rail; default hidden until sources exist */
.hfoot{position:absolute;left:var(--pad);bottom:calc(var(--pad) * .34);z-index:4;
  display:flex;align-items:center;gap:.55em .9em;flex-wrap:wrap;font-size:.72em;color:var(--ink-faint);
  padding:.4em .9em;border-radius:99px;background:oklch(0.19 0.012 74/.5);border:1px solid oklch(0.34 0.016 74/.4)}
.hfoot .hd{display:inline-flex;align-items:center;gap:.45em}
.hfoot .hd i{width:.46em;height:.46em;border-radius:50%;background:var(--idle);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset}
.hfoot .hd i.ok{background:var(--done);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 5px -1px var(--done)}
.hfoot .hd i.stale{background:var(--run);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 5px -1px var(--run)}
.hfoot .hd i.unauthorized{background:var(--need);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 6px -1px var(--need)}
.hfoot .hd i.error{background:var(--err);box-shadow:0 0 0 1px oklch(0 0 0/.4) inset,0 0 6px -1px var(--err)}
.hfoot .hd i.off{background:var(--idle);opacity:.5}
.hfoot .hd .hn{letter-spacing:.1em;text-transform:uppercase;font-size:.94em;font-weight:500;color:var(--ink-dim)}
.hfoot .hint{color:oklch(0.86 0.05 40);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.hfoot .sep{opacity:.3}

/* ==========================================================
   Global overlays — waiting + stale (intentional cards, not bare text)
   ========================================================== */
.overlay{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  text-align:center;pointer-events:none}
.overlay .card{display:flex;flex-direction:column;align-items:center;gap:.85em;
  padding:var(--s5) var(--s6);border-radius:var(--r);
  background:var(--panel-bg);border:1px solid var(--panel-line);
  box-shadow:var(--panel-shadow),inset 0 1px 0 var(--panel-hi);position:relative;overflow:hidden}
.overlay .card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:var(--grain);background-size:180px 180px;opacity:.5;mix-blend-mode:overlay}
.overlay .card > *{position:relative;z-index:1}
.overlay .glyph{width:clamp(32px,3.6vmin,58px);height:clamp(32px,3.6vmin,58px);opacity:.65}
.overlay .msg{font-size:.86em;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);font-weight:500}
.overlay .sub{font-size:.74em;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.02em}

/* waiting: quiet, centred pulse on the warm bg */
body[data-state="waiting"] #waiting{display:flex}
#waiting .msg{color:var(--ink-faint)}
#waiting .glyph{animation:breatheGlyph 3.2s ease-in-out infinite}

/* stale: dim veil over the still-shown last frame */
#stale{background:oklch(0.13 0.01 74/.5);backdrop-filter:blur(3px) saturate(.82);-webkit-backdrop-filter:blur(3px) saturate(.82)}
body[data-stale="1"] #stale{display:flex}
#stale .msg{color:var(--ink-dim)}
#stale .glyph{color:var(--run)!important;opacity:.75}

/* ---------- animations ---------- */
@keyframes scrollwave{to{transform:translateX(-50%)}}
@keyframes breathe{0%,100%{opacity:calc(.28 * var(--glow,1))}50%{opacity:calc(.85 * var(--glow,1))}}
@keyframes breatheGlyph{0%,100%{opacity:.35}50%{opacity:.8}}
@keyframes stripIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* motion applied only when allowed (class toggled by JS/config) */
body.motion .strip.is-running .wave svg{animation:scrollwave 2.6s linear infinite}
body.motion .strip.enter{animation:stripIn .5s cubic-bezier(.2,.7,.2,1)}
/* Native reduceMotion (config) must silence EVERYTHING the OS media query
   would — breathing, glow, pulses, value transitions — not just the wave. */
body:not(.motion) *,body:not(.motion) *::before,body:not(.motion) *::after{animation:none!important;transition:none!important}
/* Quota numbers older than the capture freshness window read as history, not
   live truth. */
.limits-stale{opacity:.55;filter:saturate(.6)}

@media (prefers-reduced-motion:reduce){
  .strip.is-needsInput::after{animation:none}
  #waiting .glyph{animation:none}
  body.motion .strip.is-running .wave svg{animation:none}
  body.motion .strip.enter{animation:none}
  .bar i,.core .cb i,.ring,.dial .dc .v,.pill,.strip{transition:none}
}

<script>
"use strict";
(function(){
/* ==========================================================
   Monitor dashboard runtime
   ==========================================================
   Push-fed, no network. Guards for standalone-browser opening.
   ---------------------------------------------------------- */

var DEBUG = false;              // single guarded debug flag; no console spam otherwise
function log(){ if(DEBUG && window.console) console.log.apply(console, arguments); }

/* ---------- element cache ---------- */
var $ = function(id){ return document.getElementById(id); };
var body = document.body;

/* ---------- config + i18n ---------- */
var cfg = {
  locale: (navigator.language || "en"),
  reduceMotion: false,
  modules: { system:true, agents:true, usage:true },
  refreshHz: 1
};
function isZh(){ return /^zh/i.test(cfg.locale || ""); }

var STR = {
  en: {
    waiting: "Waiting for data…",
    waitingSub: "listening for native push",
    stale: "Signal stale",
    staleSince: function(t){ return "last update " + t; },
    unauthorized: "unauthorized",
    resets: function(s){ return "resets " + s; },
    ended: "ended",
    running: "running", idle: "idle", needsInput: "needs you", unknown: "—",
    finishedAgo: function(s){ return "finished " + s + " ago"; },
    noAgents: "no active sessions"
  },
  zh: {
    waiting: "等待数据…",
    waitingSub: "正在监听原生推送",
    stale: "信号已过期",
    staleSince: function(t){ return "最后更新 " + t; },
    unauthorized: "未授权",
    resets: function(s){ return s + "后重置"; },
    ended: "已结束",
    running: "运行中", idle: "空闲", needsInput: "需要你", unknown: "—",
    finishedAgo: function(s){ return s + "前完成"; },
    noAgents: "暂无活动会话"
  }
};
function T(){ return isZh() ? STR.zh : STR.en; }

/* ---------- native bridge (guarded for plain browser) ---------- */
function bridge(){
  return (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.monitorBridge) || null;
}
function post(msg){
  var b = bridge();
  if(b){ try{ b.postMessage(msg); }catch(e){ log("post fail", e); } }
}

/* ==========================================================
   Formatters
   ========================================================== */
function fmtBytesRate(bps){
  bps = +bps || 0;
  if(bps < 1)      return "0 B/s";
  if(bps < 1024)   return Math.round(bps) + " B/s";
  if(bps < 1048576) return (bps/1024).toFixed(bps < 10240 ? 1 : 0) + " KB/s";
  if(bps < 1073741824) return (bps/1048576).toFixed(bps < 10485760 ? 1 : 0) + " MB/s";
  return (bps/1073741824).toFixed(1) + " GB/s";
}
function fmtBytes(b){
  b = +b || 0;
  if(b < 1024) return b + " B";
  if(b < 1048576) return (b/1024).toFixed(0) + " KB";
  if(b < 1073741824) return (b/1048576).toFixed(b < 10485760 ? 1 : 0) + " MB";
  return (b/1073741824).toFixed(b < 10737418240 ? 1 : 0) + " GB";
}
function fmtGiB(b){ return (( +b||0 ) / 1073741824); }
function fmtUptime(sec){
  sec = Math.max(0, Math.floor(+sec || 0));
  var d = Math.floor(sec/86400); sec -= d*86400;
  var h = Math.floor(sec/3600);  sec -= h*3600;
  var m = Math.floor(sec/60);
  if(d > 0) return d + "d " + h + ":" + pad2(m);
  return h + ":" + pad2(m);
}
function fmtDurShort(sec){       // "3:12" / "1:04:09"
  sec = Math.max(0, Math.floor(+sec || 0));
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h > 0) return h + ":" + pad2(m) + ":" + pad2(s);
  return m + ":" + pad2(s);
}
function fmtCountdown(sec){      // "2h 14m" / "14m" / "42s"
  sec = Math.max(0, Math.floor(+sec || 0));
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  if(h > 0) return h + "h " + m + "m";
  if(m > 0) return m + "m";
  return sec + "s";
}
function fmtAgo(sec){            // "2m" / "40s" / "1h"
  sec = Math.max(0, Math.floor(+sec || 0));
  if(sec < 60) return sec + "s";
  if(sec < 3600) return Math.floor(sec/60) + "m";
  if(sec < 86400) return Math.floor(sec/3600) + "h";
  return Math.floor(sec/86400) + "d";
}
function fmtUSD(v){
  if(v == null || isNaN(v)) return "—";
  v = +v;
  if(v === 0) return "$0.00";
  if(v < 10) return "$" + v.toFixed(2);
  if(v < 1000) return "$" + v.toFixed(1);
  return "$" + Math.round(v).toLocaleString();
}
function pad2(n){ return (n<10?"0":"") + n; }
function pct01(x){ return clamp(Math.round((+x||0)*100), 0, 100); }
function pctRaw(x){ return clamp(Math.round(+x||0), 0, 100); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function esc(s){ return String(s==null?"":s).replace(/[<>&]/g, function(c){ return c==="<"?"&lt;":c===">"?"&gt;":"&amp;"; }); }

/* ==========================================================
   Ring buffers for sparklines (client-side history)
   ========================================================== */
var RING = 150;
function Ring(n){ this.n = n||RING; this.a = []; }
Ring.prototype.push = function(v){ this.a.push(+v||0); if(this.a.length > this.n) this.a.shift(); };
Ring.prototype.max = function(){ var m=0,i; for(i=0;i<this.a.length;i++) if(this.a[i]>m) m=this.a[i]; return m; };
Ring.prototype.last = function(){ return this.a.length ? this.a[this.a.length-1] : 0; };

var series = {
  netRx: new Ring(), netTx: new Ring(),
  diskR: new Ring(), diskW: new Ring()
};

/* draw two overlaid sparklines into a host (rx amber-ish, tx cool).
   Soft area-fill fade below each line + a "now" dot at the head of the
   primary (first) series. preserveAspectRatio="none" keeps it fluid. */
var _sparkSeq = 0;
function drawSpark(host, ringsColors){
  if(!host) return;
  var W = 240, H = 48, uid = "sp" + (++_sparkSeq);
  // gradient defs for each series' fade (opaque near the line → transparent at baseline)
  var defs = "";
  for(var d=0; d<ringsColors.length; d++){
    if(!ringsColors[d].fill) continue;
    defs += '<linearGradient id="'+uid+'g'+d+'" x1="0" y1="0" x2="0" y2="1">'
         +  '<stop offset="0" stop-color="'+ringsColors[d].fill+'"/>'
         +  '<stop offset="1" stop-color="'+ringsColors[d].fill+'" stop-opacity="0"/></linearGradient>';
  }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';
  if(defs) svg += '<defs>'+defs+'</defs>';
  svg += '<line class="base" x1="0" y1="'+(H-1)+'" x2="'+W+'" y2="'+(H-1)+'"/>';
  // shared scale across the pair so ↓ and ↑ are comparable
  var scaleMax = 1;
  for(var s=0;s<ringsColors.length;s++) scaleMax = Math.max(scaleMax, ringsColors[s].ring.max());
  scaleMax *= 1.18;
  var headFrac = null, headCol = null;   // primary series head, as 0..1 of height
  for(var k=0;k<ringsColors.length;k++){
    var arr = ringsColors[k].ring.a, col = ringsColors[k].color, fill = ringsColors[k].fill;
    var len = arr.length; if(len < 2){ continue; }
    var pts = [], i, lastFrac = 0;
    for(i=0;i<len;i++){
      var x = (i/(len-1))*W;
      var frac = (arr[i]/scaleMax);                 // 0 (baseline) .. 1 (top)
      var y = H - 1 - frac*(H-4);
      pts.push(x.toFixed(1)+","+y.toFixed(1));
      lastFrac = frac;
    }
    if(fill){
      svg += '<polygon points="0,'+(H-1)+' '+pts.join(' ')+' '+W+','+(H-1)+'" fill="url(#'+uid+'g'+k+')"/>';
    }
    svg += '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
    if(k === 0){ headFrac = lastFrac; headCol = col; }  // primary series head
  }
  // "now" dot as a CSS-positioned element (not inside the stretched SVG, so it stays round)
  var dot = "";
  if(headFrac != null){
    var topPct = (100 - Math.min(1, Math.max(0, headFrac)) * ((H-4)/H*100)) - (1/H*100);
    dot = '<span class="nowdot" style="--nc:'+headCol+';top:'+topPct.toFixed(1)+'%"></span>';
  }
  host.innerHTML = svg + dot;
}

/* ==========================================================
   Living waveform builder (ported from the mock)
   Two seamless segments; CSS animates translateX(-50%).
   ========================================================== */
function buildWaveSVG(){
  var W = 260, H = 30, mid = H/2, seg = [], x = 0;
  seg.push([0, mid]);
  while(x < W){
    x += 6 + Math.random()*10;
    // a touch more amplitude — this is THE signature element, give it presence
    var amp = (2.5 + Math.random()*12) * (Math.random()<0.5 ? -1 : 1);
    seg.push([Math.min(x, W), clamp(mid + amp, 2, H-2)]);
  }
  seg.push([W, mid]);
  var linePts = [], areaPts = [];
  var push = function(off){
    for(var i=0;i<seg.length;i++){
      var px = (seg[i][0]+off).toFixed(1), py = seg[i][1].toFixed(1);
      linePts.push(px+","+py); areaPts.push(px+","+py);
    }
  };
  push(0); push(W);
  // soft area fill under the trace (CSS colours .warea with the run hue @ low alpha)
  var area = '0,'+H+' ' + areaPts.join(' ') + ' '+(W*2)+','+H;
  var uid = "wg" + (++_sparkSeq);
  return '<svg viewBox="0 0 '+(W*2)+' '+H+'" preserveAspectRatio="none">'
    + '<defs><linearGradient id="'+uid+'" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0" stop-color="currentColor" stop-opacity="0.24"/>'
    + '<stop offset="1" stop-color="currentColor" stop-opacity="0.02"/></linearGradient></defs>'
    + '<polygon class="warea" points="'+area+'" fill="url(#'+uid+')"/>'
    + '<polyline fill="none" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" points="'+linePts.join(' ')+'"/></svg>';
}

/* ==========================================================
   State
   ========================================================== */
var lastSnapshot = null;
var lastPushWall = 0;           // performance.now() of last real push
var everPushed = false;
var mockRunning = false;
var STALE_MS = 6000;

/* per-agent view cache so we keep waveform DOM + glow timers stable across pushes */
var agentViews = {};            // id -> { el, waveEl, status, needSince }

/* ==========================================================
   Layout selection
   ========================================================== */
function chooseLayout(snap){
  var agentsOff = (cfg.modules && cfg.modules.agents === false);
  var hasAgents = snap && snap.agents != null && !agentsOff;
  return hasAgents ? "fleet" : "hero";
}

/* ==========================================================
   RENDER — entry
   ========================================================== */
function render(snap){
  if(!snap) return;
  lastSnapshot = snap;
  var layout = chooseLayout(snap);
  body.setAttribute("data-layout", layout);

  if(layout === "hero") renderHero(snap);
  else                  renderFleet(snap);
}

/* ---------- SYSTEM HERO ---------- */
function renderHero(snap){
  var sys = snap.system || null;
  $("hero-sub").textContent = sys ? "" : (T().noAgents);

  if(!sys){
    // system module disabled/absent while in hero layout — keep calm, dim instruments
    setDial(0, false);
    return;
  }

  // CPU dial
  var cpu = pct01(sys.cpuTotal);
  setDial(cpu, true);
  $("cpu-dv").innerHTML = cpu + "<small>%</small>";
  // dial side: user/sys split + load
  var side = $("dial-side");
  var sideHTML = "";
  if(sys.cpuUser != null)   sideHTML += kv("user", pct01(sys.cpuUser) + "%");
  if(sys.cpuSystem != null) sideHTML += kv("sys",  pct01(sys.cpuSystem) + "%");
  if(sys.loadAverage1 != null) sideHTML += kv("load", (+sys.loadAverage1).toFixed(2));
  side.innerHTML = sideHTML;

  // cores
  renderCores($("cores"), sys.perCore);
  $("cores-load").textContent = sys.loadAverage1 != null ? ("load " + (+sys.loadAverage1).toFixed(2)) : "";

  // MEM
  if(sys.memTotalBytes){
    var mp = clamp(sys.memUsedBytes / sys.memTotalBytes, 0, 1);
    setBar($("mem-bar"), mp*100, sys.memPressure === "critical" ? "warn" : (sys.memPressure === "warn" ? "warm" : ""));
    $("mem-val").innerHTML = fmtGiB(sys.memUsedBytes).toFixed(1) + '<small>/' + fmtGiB(sys.memTotalBytes).toFixed(0) + ' GB</small>';
  } else { $("mem-val").textContent = "—"; setBar($("mem-bar"),0,""); }
  setPressureLabel($("mem-pressure-lbl"), sys.memPressure);

  // GPU (hide if null)
  if(sys.gpuUsage == null){ $("gpu-gauge").style.display = "none"; }
  else {
    $("gpu-gauge").style.display = "";
    var g = pct01(sys.gpuUsage);
    setBar($("gpu-bar"), g, "cool"); $("gpu-val").innerHTML = g + "<small>%</small>";
  }

  // SWAP (show only if present & > 0)
  if(sys.swapUsedBytes && sys.swapUsedBytes > 0 && sys.memTotalBytes){
    $("swap-gauge").style.display = "";
    setBar($("swap-bar"), clamp(sys.swapUsedBytes/sys.memTotalBytes,0,1)*100, "");
    $("swap-val").innerHTML = fmtBytes(sys.swapUsedBytes);
  } else { $("swap-gauge").style.display = "none"; }

  // NET + DISK sparklines
  series.netRx.push(sys.netRxBytesPerSec); series.netTx.push(sys.netTxBytesPerSec);
  series.diskR.push(sys.diskReadBytesPerSec); series.diskW.push(sys.diskWriteBytesPerSec);
  drawSpark($("net-spark"), [
    { ring: series.netRx, color: "oklch(0.80 0.128 78)", fill: "oklch(0.80 0.128 78 / .10)" },
    { ring: series.netTx, color: "oklch(0.68 0.05 235)", fill: "oklch(0.68 0.05 235 / .10)" }
  ]);
  drawSpark($("disk-spark"), [
    { ring: series.diskR, color: "oklch(0.76 0.10 158)", fill: "oklch(0.76 0.10 158 / .10)" },
    { ring: series.diskW, color: "oklch(0.68 0.05 235)", fill: null }
  ]);
  $("net-rate").innerHTML = "↓ " + fmtBytesRate(sys.netRxBytesPerSec) + "  ↑ " + fmtBytesRate(sys.netTxBytesPerSec);
  $("disk-rate").innerHTML = "R " + fmtBytesRate(sys.diskReadBytesPerSec) + "  W " + fmtBytesRate(sys.diskWriteBytesPerSec);

  // bottom vitals strip (thermal / uptime / battery / pressure)
  renderVitalsStrip($("hero-vitals"), sys);
}

function kv(k,n){ return '<div class="kv"><span class="k">'+esc(k)+'</span><span class="n">'+esc(n)+'</span></div>'; }

function renderCores(host, cores){
  if(!host) return;
  if(!cores || !cores.length){ host.innerHTML = ""; return; }
  host.classList.toggle("wide", cores.length > 8);
  var html = "", i;
  for(i=0;i<cores.length;i++){
    var p = pct01(cores[i]);
    html += '<div class="core"><b>C'+i+'</b><div class="cb"><i style="width:'+p+'%"></i></div><span>'+p+'%</span></div>';
  }
  host.innerHTML = html;
}

function setDial(pct, active){
  var d = $("cpu-dial");
  d.style.setProperty("--p", pct);
  // amber ramps hotter as it climbs; stays amber (no neon)
  d.style.setProperty("--ring-c", active ? (pct > 85 ? "var(--need)" : "var(--run)") : "var(--track)");
}
function setBar(el, pct, cls){
  if(!el) return;
  el.style.width = clamp(pct,0,100) + "%";
  el.className = cls ? cls : "";
}
function setPressureLabel(el, mp){
  if(!el) return;
  if(mp === "warn"){ el.textContent = "pressure · warn"; el.style.color = "var(--run)"; }
  else if(mp === "critical"){ el.textContent = "pressure · critical"; el.style.color = "var(--need)"; }
  else { el.textContent = ""; el.style.color = ""; }
}

function renderVitalsStrip(host, sys){
  if(!host) return;
  var parts = [];
  // thermal
  var thermal = sys.thermalState || "nominal";
  var tcls = thermal === "critical" ? "crit" : (thermal === "serious" ? "warn" : (thermal === "fair" ? "warn" : ""));
  parts.push('<span class="pill '+tcls+'"><span class="dot"></span><span class="k">Thermal</span><span class="n">'+esc(thermal)+'</span></span>');
  // load
  if(sys.loadAverage1 != null)
    parts.push('<span class="pill"><span class="k">Load</span><span class="n">'+(+sys.loadAverage1).toFixed(2)+'</span></span>');
  // uptime
  if(sys.uptimeSeconds != null)
    parts.push('<span class="pill"><span class="k">Uptime</span><span class="n">'+fmtUptime(sys.uptimeSeconds)+'</span></span>');
  // memory pressure badge
  if(sys.memPressure === "warn" || sys.memPressure === "critical"){
    var pc = sys.memPressure === "critical" ? "crit" : "warn";
    parts.push('<span class="pill '+pc+'"><span class="dot"></span><span class="k">MEM</span><span class="n">'+esc(sys.memPressure)+'</span></span>');
  }
  // battery (hide if null)
  if(sys.batteryLevel != null){
    var bl = clamp(sys.batteryLevel,0,1);
    var low = bl <= 0.2 && !sys.batteryCharging;
    var chg = sys.batteryCharging ? " chg" : "";
    parts.push('<span class="pill batt'+(low?" low":"")+chg+'"><span class="k">Batt</span>'
      + '<span class="track"><i style="width:'+Math.round(bl*100)+'%"></i></span>'
      + '<span class="n">'+Math.round(bl*100)+'%</span></span>');
  }
  host.innerHTML = parts.join("");
}

/* ---------- FLEET ---------- */
function renderFleet(snap){
  var agents = snap.agents || [];
  // sub: "N agents · M projects"
  var projects = {}; agents.forEach(function(a){ if(a.projectName) projects[a.projectName]=1; });
  var nProj = Object.keys(projects).length;
  $("fleet-sub").textContent = agents.length + (agents.length===1?" agent":" agents")
    + (nProj ? " · " + nProj + (nProj===1?" project":" projects") : "");

  renderFleetVitals(snap.system);
  renderUsage(snap.usage);
  renderRail(agents);
  renderHealth(snap.health);
}

function renderFleetVitals(sys){
  var box = $("fleet-vitals");
  if(!sys){ box.style.opacity = ".5"; setMiniArc("marc-cpu",0,"—"); setMiniArc("marc-mem",0,"—"); return; }
  box.style.opacity = "";
  setMiniArc("marc-cpu", pct01(sys.cpuTotal), pct01(sys.cpuTotal)+"%");
  var memPct = sys.memTotalBytes ? clamp(sys.memUsedBytes/sys.memTotalBytes,0,1)*100 : 0;
  setMiniArc("marc-mem", memPct, Math.round(memPct)+"%");
  if(sys.gpuUsage == null){ $("marc-gpu").style.display = "none"; }
  else { $("marc-gpu").style.display = ""; setMiniArc("marc-gpu", pct01(sys.gpuUsage), pct01(sys.gpuUsage)+"%"); }
  $("fleet-net").textContent = "↓ " + fmtBytesRate(sys.netRxBytesPerSec) + "  ↑ " + fmtBytesRate(sys.netTxBytesPerSec);
  // thermal hint next to hostname
  var th = sys.thermalState || "nominal";
  var thermEl = $("vitals-therm");
  if(th === "nominal"){ thermEl.textContent = ""; }
  else { thermEl.textContent = th; thermEl.style.color = (th==="critical") ? "var(--need)" : "var(--run)"; }
}
function setMiniArc(id, pct, label){
  var el = $(id); if(!el) return;
  el.style.setProperty("--p", clamp(pct,0,100));
  el.style.setProperty("--ring-c", pct > 85 ? "var(--need)" : "var(--run)");
  var v = el.querySelector(".v"); if(v) v.textContent = label;
}

function renderUsage(usage){
  var box = $("fleet-usage");
  if(!usage || (cfg.modules && cfg.modules.usage === false)){ box.style.display = "none"; return; }
  var any = usage.fiveHourUsedPercent != null || usage.weekUsedPercent != null || usage.costTodayUSD != null;
  if(!any){ box.style.display = "none"; return; }
  box.style.display = "";
  box.classList.toggle("limits-stale", usage.limitsStale === true);

  // 5h ring
  if(usage.fiveHourUsedPercent != null){
    $("usage-5h").parentNode.style.display = "";
    var p5 = pctRaw(usage.fiveHourUsedPercent);
    var r = $("usage-5h"); r.style.setProperty("--p", p5);
    r.style.setProperty("--ring-c", p5 >= 90 ? "var(--need)" : (p5 >= 75 ? "var(--run)" : "var(--run)"));
    $("usage-5h-v").textContent = p5 + "%";
    // reset countdown
    if(usage.fiveHourResetsAt != null){
      var secs = usage.fiveHourResetsAt - (Date.now()/1000);
      $("usage-5h-reset").textContent = secs > 0 ? T().resets(fmtCountdown(secs)) : T().resets("now");
    } else $("usage-5h-reset").textContent = "5H";
  } else { $("usage-5h").parentNode.style.display = "none"; }

  // week bar
  if(usage.weekUsedPercent != null){
    $("usage-week-wrap").style.display = "";
    var pw = pctRaw(usage.weekUsedPercent);
    setBar($("usage-week-bar"), pw, pw >= 90 ? "warn" : "warm");
    var wtxt = pw + "%";
    if(usage.weekResetsAt != null){
      var ws = usage.weekResetsAt - (Date.now()/1000);
      if(ws > 0) wtxt += " · " + T().resets(fmtCountdown(ws));
    }
    $("usage-week-n").textContent = wtxt;
  } else { $("usage-week-wrap").style.display = "none"; }

  // today $
  if(usage.costTodayUSD != null){
    $("usage-today-wrap").style.display = "";
    $("usage-today").textContent = fmtUSD(usage.costTodayUSD);
  } else { $("usage-today-wrap").style.display = "none"; }
}

/* rail: reconcile agent strips (keep DOM stable across pushes for waveform + glow) */
function renderRail(agents){
  var host = $("rail-strips");
  var lead = $("rail").querySelector(".rail-lead");
  if(!agents.length){
    host.innerHTML = '<div class="rail-empty">'+esc(T().noAgents)+'</div>';
    agentViews = {};
    if(lead) lead.style.display = "";
    return;
  }
  if(lead) lead.style.display = "";

  // sort: needsInput first (widest, most urgent), then running, idle, unknown, ended last
  var order = { needsInput:0, running:1, unknown:2, idle:3, ended:4 };
  var sorted = agents.slice().sort(function(a,b){
    var oa = order[a.status] != null ? order[a.status] : 2;
    var ob = order[b.status] != null ? order[b.status] : 2;
    if(oa !== ob) return oa - ob;
    return (b.lastEventAt||0) - (a.lastEventAt||0);
  });

  var seen = {};
  var now = Date.now()/1000;
  sorted.forEach(function(a){
    seen[a.id] = 1;
    var view = agentViews[a.id];
    if(!view){
      view = { el: makeStrip(a), waveEl: null, status: null, needSince: 0 };
      view.waveEl = view.el.querySelector(".wave");
      agentViews[a.id] = view;
      // enter-fade for newly appearing strips (CSS gates on body.motion; self-clears)
      view.el.classList.add("enter");
      (function(elx){ setTimeout(function(){ elx.classList.remove("enter"); }, 600); })(view.el);
    }
    updateStrip(view, a, now);
    host.appendChild(view.el);   // re-append moves into sorted order
  });

  // remove strips for agents no longer present
  Object.keys(agentViews).forEach(function(id){
    if(!seen[id]){
      var v = agentViews[id];
      if(v.el && v.el.parentNode) v.el.parentNode.removeChild(v.el);
      delete agentViews[id];
    }
  });
}

function makeStrip(a){
  var el = document.createElement("div");
  el.className = "strip";
  el.setAttribute("data-id", a.id);
  el.innerHTML =
    '<span class="lead-tick"></span>'
    + '<div class="row1"><span class="prov"></span><span class="name"></span><span class="status"></span></div>'
    + '<div class="ask" style="display:none"></div>'
    + '<div class="meta"></div>'
    + '<div class="wave"><div class="flat"></div></div>'
    + '<div class="wave-foot"><span class="t t-left"></span><span class="t t-right"></span></div>';
  // double-click → focus session
  el.addEventListener("dblclick", function(){
    post({ type: "focusSession", id: a.id });
  });
  return el;
}

function updateStrip(view, a, now){
  var el = view.el;
  var st = a.status || "unknown";

  // status class (transition without rebuilding)
  if(view.status !== st){
    el.className = "strip is-" + st;
    view.status = st;
    // waveform: running gets a scrolling SVG (built once, kept)
    var wave = view.waveEl;
    if(st === "running" && !wave.querySelector("svg")){
      wave.insertAdjacentHTML("afterbegin", buildWaveSVG());
    }
    // needsInput glow-decay start
    if(st === "needsInput"){ view.needSince = now; }
  }

  // provider glyph
  var prov = el.querySelector(".prov");
  prov.textContent = (a.provider || "?");
  prov.setAttribute("data-p", a.provider || "");

  // name
  el.querySelector(".name").textContent = a.projectName || a.id || "—";

  // status label
  el.querySelector(".status").textContent = statusLabel(st);

  // ask line (needsInput only) — statusDetail is a tool/verb, safe to show
  var ask = el.querySelector(".ask");
  if(st === "needsInput"){
    ask.style.display = "";
    ask.innerHTML = a.statusDetail ? esc(a.statusDetail) : ("<b>" + esc(T().needsInput) + "</b>");
  } else ask.style.display = "none";

  // meta chips: branch, statusDetail, model, turns
  var meta = el.querySelector(".meta");
  var chips = [];
  if(a.gitBranch) chips.push('<span class="chip b">'+esc(a.gitBranch)+'</span>');
  if(a.statusDetail && st !== "needsInput") chips.push('<span class="chip">'+esc(a.statusDetail)+'</span>');
  if(a.model) chips.push('<span class="dim">'+esc(shortModel(a.model))+'</span>');
  if(a.turnCount) chips.push('<span class="dim">'+a.turnCount+ (a.turnCount===1?" turn":" turns")+'</span>');
  meta.innerHTML = chips.join("");

  // wave-foot: left = activity/time, right = cost
  var left = el.querySelector(".t-left"), right = el.querySelector(".t-right");
  if(st === "ended"){
    left.textContent = T().finishedAgo(fmtAgo(now - (a.lastEventAt||now)));
    right.textContent = a.costUSD != null ? fmtUSD(a.costUSD) : "✓";
  } else if(st === "running"){
    var elapsed = a.startedAt ? (now - a.startedAt) : (now - (a.lastEventAt||now));
    left.textContent = (a.statusDetail ? "" : "") + fmtDurShort(elapsed);
    right.textContent = a.costUSD != null ? fmtUSD(a.costUSD) : "";
  } else if(st === "needsInput"){
    left.textContent = "";
    right.textContent = a.costUSD != null ? fmtUSD(a.costUSD) : "";
  } else {
    left.textContent = "";
    right.textContent = "";
  }

  // process-dead hint: dim if not alive and not already ended
  if(a.processAlive === false && st !== "ended"){ el.style.opacity = "0.5"; }
  else if(st !== "ended" && st !== "idle" && st !== "needsInput"){ el.style.opacity = ""; }

  // needsInput 60s glow decay: 1 → ~.25 across 60s since it entered the state
  if(st === "needsInput"){
    var age = now - (view.needSince || now);
    var glow = clamp(1 - (age/60)*0.75, 0.25, 1);
    el.style.setProperty("--glow", glow.toFixed(3));
  }
}

function statusLabel(st){
  var t = T();
  return t[st] != null ? t[st] : st;
}
function shortModel(m){
  // trim provider prefixes / dates for a quiet chip
  return String(m).replace(/^(claude-|gpt-|models\/)/i,"").replace(/-\d{8}$/,"");
}

function renderHealth(health){
  var foot = $("hfoot");
  if(!health || !health.length){ foot.innerHTML = ""; return; }
  var now = Date.now()/1000;
  var parts = [], unauthorizedHint = false;
  health.forEach(function(h, idx){
    if(idx) parts.push('<span class="sep">·</span>');
    parts.push('<span class="hd"><i class="'+esc(h.state)+'"></i><span class="hn">'+esc(h.sourceID)+'</span></span>');
    if(h.state === "unauthorized") unauthorizedHint = true;
  });
  if(unauthorizedHint){
    parts.push('<span class="sep">·</span><span class="hint">'+esc(T().unauthorized)+'</span>');
  }
  foot.innerHTML = parts.join("");
}

/* ==========================================================
   Push entry points (native → page)
   ========================================================== */
function onPush(jsonString){
  // first real push permanently kills mock mode
  if(mockRunning){ stopMock(); }
  everPushed = true;
  lastPushWall = now();
  clearStale();

  var snap;
  try { snap = (typeof jsonString === "string") ? JSON.parse(jsonString) : jsonString; }
  catch(e){ log("bad json", e); return; }
  if(!snap || typeof snap !== "object") return;

  body.setAttribute("data-state", "live");
  render(snap);
}

function onConfig(jsonString){
  var c;
  try { c = (typeof jsonString === "string") ? JSON.parse(jsonString) : jsonString; }
  catch(e){ log("bad config", e); return; }
  if(!c || typeof c !== "object") return;

  if(c.locale != null) cfg.locale = c.locale;
  if(c.reduceMotion != null) cfg.reduceMotion = !!c.reduceMotion;
  if(c.modules && typeof c.modules === "object"){
    if(c.modules.system != null) cfg.modules.system = !!c.modules.system;
    if(c.modules.agents != null) cfg.modules.agents = !!c.modules.agents;
    if(c.modules.usage  != null) cfg.modules.usage  = !!c.modules.usage;
  }
  if(c.refreshHz != null) cfg.refreshHz = +c.refreshHz;

  applyMotionPref();
  applyStaticStrings();
  // re-render with new config (layout may flip if agents module toggled)
  if(lastSnapshot) render(lastSnapshot);
}

function applyMotionPref(){
  var reduce = cfg.reduceMotion ||
    (window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches);
  body.classList.toggle("motion", !reduce);
}

function applyStaticStrings(){
  var t = T();
  $("waiting-msg").textContent = t.waiting;
  $("waiting-sub").textContent = t.waitingSub;
  $("stale-msg").textContent = t.stale;
}

/* ==========================================================
   Stale watchdog
   ========================================================== */
function now(){ return (window.performance && performance.now) ? performance.now() : Date.now(); }
function clearStale(){ body.removeAttribute("data-stale"); }
function checkStale(){
  if(!everPushed) return;
  var age = now() - lastPushWall;
  if(age > STALE_MS){
    body.setAttribute("data-stale", "1");
    var when = lastSnapshot && lastSnapshot.timestamp ? tsToClock(lastSnapshot.timestamp) : "";
    $("stale-sub").textContent = when ? T().staleSince(when) : "";
  }
}
function tsToClock(epochSec){
  var d = new Date((+epochSec||0)*1000);
  var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  return pad2(h)+":"+pad2(m)+":"+pad2(s);
}

/* animation frame loop: refresh live timers (running elapsed, glow decay,
   countdowns) between pushes without needing new data, + stale check.
   Throttled to ~1Hz to stay quiet. */
var lastTick = 0;
function loop(t){
  requestAnimationFrame(loop);
  if(t - lastTick < 950) return;
  lastTick = t;
  checkStale();
  // live re-tick of fleet timers/glow (cheap; only if fleet + snapshot present)
  if(lastSnapshot && body.getAttribute("data-layout") === "fleet" && lastSnapshot.agents){
    var nowSec = Date.now()/1000;
    lastSnapshot.agents.forEach(function(a){
      var v = agentViews[a.id];
      if(v) updateStrip(v, a, nowSec);
    });
    // usage countdowns tick too
    renderUsage(lastSnapshot.usage);
  }
}
requestAnimationFrame(loop);

/* ==========================================================
   MOCK generator (design iteration only; ?mock=1 [&fleet=1])
   Self-disables permanently on first real push.
   ========================================================== */
function mockEnabled(){
  var q = location.search || "", h = location.hash || "";
  return /(?:^|[?&])mock=1/.test(q) || /(?:^|#|&)mock\b/.test(h);
}
function mockFleet(){
  var q = location.search || "", h = location.hash || "";
  return /(?:[?&])fleet=1/.test(q) || /(?:#|&)fleet\b/.test(h);
}
var mockTimer = null, mockT = 0;
function startMock(){
  if(mockRunning) return;
  mockRunning = true;
  var fleet = mockFleet();
  var tick = function(){
    if(!mockRunning) return;
    mockT += 1;
    var snap = fleet ? genFleetSnap(mockT) : genSystemSnap(mockT);
    // route through the normal path EXCEPT don't let it flip everPushed
    lastPushWall = now(); clearStale();
    body.setAttribute("data-state","live");
    render(snap);
  };
  tick();
  mockTimer = setInterval(tick, 1000);
}
function stopMock(){
  mockRunning = false;
  if(mockTimer){ clearInterval(mockTimer); mockTimer = null; }
}
function wobble(base, amp, t, sp){ return clamp(base + Math.sin(t*sp)*amp + (Math.random()-0.5)*amp*0.5, 0, 1); }
function genSystemSnap(t){
  var cores = []; for(var i=0;i<10;i++) cores.push(wobble(0.15+0.1*(i%3), 0.2, t, 0.3+i*0.05));
  var cpu = cores.reduce(function(s,x){return s+x;},0)/cores.length;
  return {
    schemaVersion:1, timestamp: Date.now()/1000,
    system:{
      cpuTotal:cpu, cpuUser:cpu*0.7, cpuSystem:cpu*0.3, perCore:cores,
      memUsedBytes: (12 + Math.sin(t*0.1)*3 + Math.random())*1073741824,
      memTotalBytes: 32*1073741824,
      memPressure: cpu>0.8?"warn":"normal",
      swapUsedBytes: 0,
      gpuUsage: wobble(0.2,0.18,t,0.4),
      thermalState: cpu>0.85?"fair":"nominal",
      netRxBytesPerSec: Math.max(0, (2 + Math.sin(t*0.5)*2 + Math.random()*3))*1048576,
      netTxBytesPerSec: Math.max(0, (0.3 + Math.sin(t*0.7)*0.3 + Math.random()*0.4))*1048576,
      diskReadBytesPerSec: Math.max(0, Math.random()*40)*1048576,
      diskWriteBytesPerSec: Math.max(0, Math.random()*12)*1048576,
      batteryLevel: 0.62, batteryCharging: t%40 < 20,
      uptimeSeconds: 143000 + t,
      loadAverage1: 2 + cpu*4,
      topProcesses:[]
    }
  };
}
function genFleetSnap(t){

    { id:"claude:3", provider:"claude", projectName:"scratch", status:"ended",

    { id:"claude:4", provider:"claude", projectName:"infra", status:"idle",
      statusDetail:null, model:null, gitBranch:null,
      startedAt: nowS-900, lastEventAt: nowS-300, processAlive:true, turnCount:2,
      tokens:{input:5000,output:400,cacheRead:0,cacheWrite:0}, costUSD:null }
  ];
  base.usage = {
    costTodayUSD: 12.4 + Math.sin(t*0.05),

    perProvider:{ claude:{costTodayUSD:8.1}, codex:{costTodayUSD:4.3} },

    fiveHourResetsAt: nowS + 8040,

  };

    { sourceID:"claude", state:"ok", detail:null, lastUpdateAt: nowS-1 },

/* ==========================================================
   Boot
   ========================================================== */
window.__monitorPush = onPush;
window.__monitorConfig = onConfig;

function boot(){
  applyMotionPref();
  applyStaticStrings();
  post({ type: "ready" });
  if(mockEnabled()) startMock();
}
if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", boot);
} else boot();

})();
