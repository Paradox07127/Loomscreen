name: Release Loomscreen

# Cuts a public Loomscreen release when an annotated tag matching
# `loomscreen-v*.*.*` is pushed. Builds the LiveWallpaperLite scheme,
# ad-hoc signs it, packages a DMG + SHA-256, and publishes everything
# to GitHub Releases under the same tag.
#
# Pro releases use a separate tag namespace (`v*.*.*`) and are NOT
# triggered by this workflow.

on:
  push:
    tags:
      - 'loomscreen-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 1.0.0). For manual smoke-runs only; tag-driven runs ignore this.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build, sign, publish
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install ripgrep
        # scripts/release_candidate_check.sh greps with `rg` for terse,
        # alternation-friendly patterns. Local dev usually has it via brew;
        # GitHub's macos-15 runner does not ship ripgrep, so the first
        # `rg` call in the script aborts with "command not found".
        run: brew install ripgrep

      - name: Resolve version from tag or input
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "${DISPATCH_VERSION:-}" ]]; then
            version="${DISPATCH_VERSION}"
            tag="loomscreen-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#loomscreen-v}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: resolved version '$version' is not major.minor.patch" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Building Loomscreen $version (tag $tag)"

      - name: Show signing identities (sanity)
        run: security find-identity -p codesigning -v || true

      - name: Package release
        env:
          DERIVED_DATA: ${{ runner.temp }}/LoomscreenRelease
        run: |
          ./scripts/release-loomscreen.sh --version "${{ steps.version.outputs.version }}"

      - name: Upload DMG as workflow artifact (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Loomscreen-${{ steps.version.outputs.version }}
          path: |
            build/release/Loomscreen-${{ steps.version.outputs.version }}.dmg
            build/release/Loomscreen-${{ steps.version.outputs.version }}.dmg.sha256
          if-no-files-found: warn
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Loomscreen ${{ steps.version.outputs.version }}
          body: |
            Open-source Lite edition of the LiveWallpaper macOS app.

            **First launch:** macOS Gatekeeper quarantines ad-hoc-signed
            apps. Run this once after dragging Loomscreen.app into
            `/Applications`:

            ```
            xattr -dr com.apple.quarantine /Applications/Loomscreen.app
            ```

            See [CHANGELOG.md](https://github.com/Paradox07127/Loomscreen/blob/main/CHANGELOG.md)
            for the full release notes, and the [README](https://github.com/Paradox07127/Loomscreen#loomscreen-lite-edition)
            for installation and troubleshooting.
          files: |
            build/release/Loomscreen-${{ steps.version.outputs.version }}.dmg
            build/release/Loomscreen-${{ steps.version.outputs.version }}.dmg.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          generate_release_notes: true
